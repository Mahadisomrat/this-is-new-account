<!DOCTYPE html>
<html>
<head>
    <title>Student Result Card</title>

    <style>

        body{
            background: #f0f2f5;
            font-family: Arial;
        }

        .card{
            width: 350px;
            background: white;
            margin: 100px auto;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px gray;
        }

        h1{
            color: darkblue;
        }

        p{
            font-size: 18px;
        }

        .grade{
            color: green;
            font-size: 25px;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <div class="card">

        <h1>Student Result</h1>

        <p>Name: Mahadi</p>

        <p>Roll: 101</p>

        <p>Department: Computer</p>

        <p class="grade">GPA: 5.00</p>

    </div>

</body>
</html>
